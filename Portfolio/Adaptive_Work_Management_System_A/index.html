<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ===== ▼▼▼ SEO強化 METAタグ START ▼▼▼ ===== -->

    <!-- ① ページのタイトル（具体的で魅力的なものに変更） -->
    <title>適応型タスク管理ツール | あなたのペースで進捗を可視化</title>

    <!-- ② サイトの概要（検索結果に表示される説明文） -->
    <meta name="description" content="自分のペースやタスクの難易度に合わせて管理できる、シンプルなToDoリストツールです。進捗バーで達成度を可視化し、モチベーション維持をサポートします。">

    <!-- ③ このページの正規URLを検索エンジンに伝える -->
    <!-- ★★★★★ あなたのサイトの正式なURLに書き換えてください ★★★★★ -->
    <link rel="canonical" href="https://chromachannel.online/Adaptive_Work_Management_System_A/index.html" />

    <!-- ④ ファビコンの設定（任意ですが推奨） -->
    <!-- ★★★★★ ファビコン画像のパスを正しく指定してください ★★★★★ -->
    <link rel="icon" href="../img/favicon.png" type="image/png">

    <!-- ⑤ SNSでシェアされた時の表示を設定 (OGPタグ) -->
    <!-- ★★★★★ OGP画像のURLは必ず絶対パスで指定してください ★★★★★ -->
    <meta property="og:title" content="適応型タスク管理ツール | あなたのペースで進捗を可視化">
    <meta property="og:description" content="タスクの難易度設定や進捗の可視化ができる、シンプルなToDoリストツール。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://chromachannel.online/Adaptive_Work_Management_System_A/index.html">
    <meta property="og:image" content="https://chromachannel.online/img/ogp-task-tool.png">
    <meta property="og:site_name" content="山本 倫久 ポートフォリオ">
    <meta name="twitter:card" content="summary_large_image">

    <!-- ⑥ 構造化データ（このページが「Webアプリケーション」であることを伝える） -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "適応型タスク管理ツール",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "Web-based",
      "description": "ユーザーがタスクの難易度（かんたん、ふつう、むずかしい）を設定し、進捗状況をパーセンテージとプログレスバーで視覚的に追跡できる、WebベースのToDo管理アプリケーションです。",
      "author": {
        "@type": "Person",
        "name": "山本 倫久",
        "url": "https://chromachannel.online/"
      }
    }
    </script>

    <!-- ===== ▲▲▲ SEO強化 METAタグ END ▲▲▲ ===== -->

    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>適応型タスク管理ツール</h1>
            <p>自分のペースに合わせてタスクを管理しよう！</p>
        </header>

        <main>
            <section class="task-input-section">
                <h2>新しいタスクを追加</h2>
                <form id="task-form">
                    <input type="text" id="task-input" placeholder="タスクの内容を入力" required>
                    <select id="difficulty-select">
                        <option value="easy">かんたん</option>
                        <option value="normal" selected>ふつう</option>
                        <option value="hard">むずかしい</option>
                    </select>
                    <button type="submit">追加</button>
                </form>
            </section>

            <section class="task-display-section">
                <h2>タスクリスト</h2>
                <div class="filter-controls">
                    <label><input type="radio" name="filter" value="all" checked> すべて</label>
                    <label><input type="radio" name="filter" value="active"> 未完了</label>
                    <label><input type="radio" name="filter" value="completed"> 完了</label>
                </div>
                <div class="progress-container">
                    <span>進捗：</span>
                    <progress id="progress-bar" value="0" max="100"></progress>
                    <span id="progress-text">0%</span>
                </div>
                <ul id="task-list">
                    <!-- タスクはここにJavaScriptで追加されます -->
                </ul>
                <div id="feedback-message" class="feedback-message"></div>
            </section>
        </main>
    </div>

    <script src="JV/script.js"></script>
</body>
</html>
